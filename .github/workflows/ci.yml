name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  JUCE_VERSION: "8.0.12"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: ~/JUCE
          key: juce-${{ env.JUCE_VERSION }}-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Clone JUCE 8
        if: steps.cache-juce.outputs.cache-hit != 'true'
        shell: bash
        run: git clone --depth 1 --branch ${{ env.JUCE_VERSION }} https://github.com/juce-framework/JUCE.git "$HOME/JUCE"

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'Tests/CMakeLists.txt') }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_DIR="$HOME/JUCE"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -B build -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DJUCE_DIR="$HOME/JUCE"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Download pluginval (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -o pluginval.zip \
            https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip pluginval.zip
          chmod +x pluginval.app/Contents/MacOS/pluginval

      - name: Download pluginval (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri `
            "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip" `
            -OutFile pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath .

      - name: Run pluginval (macOS)
        if: runner.os == 'macOS'
        run: |
          pluginval.app/Contents/MacOS/pluginval \
            --strictness-level 10 \
            --validate-in-process \
            --timeout-ms 60000 \
            build/Grano_artefacts/Release/VST3/Grano.vst3

      - name: Run pluginval (Windows)
        if: runner.os == 'Windows'
        run: |
          .\pluginval.exe --strictness-level 10 --validate-in-process --timeout-ms 60000 `
            "build\Grano_artefacts\Release\VST3\Grano.vst3"

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Grano-VST3-${{ runner.os }}
          path: |
            build/Grano_artefacts/Release/VST3/

      - name: Upload AU (macOS only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Grano-AU-macOS
          path: build/Grano_artefacts/Release/AU/

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: Grano-Standalone-${{ runner.os }}
          path: |
            build/Grano_artefacts/Release/Standalone/

  linux-best-effort:
    name: Build (ubuntu-22.04) [best-effort]
    runs-on: ubuntu-22.04
    continue-on-error: true  # Linux is secondary target; failures don't block CI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libasound2-dev libjack-jackd2-dev \
            libcurl4-openssl-dev libfreetype-dev \
            libx11-dev libxcomposite-dev libxcursor-dev \
            libxinerama-dev libxrandr-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libfontconfig1-dev libgl1-mesa-dev

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: ~/JUCE
          key: juce-${{ env.JUCE_VERSION }}-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Clone JUCE 8
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.JUCE_VERSION }} https://github.com/juce-framework/JUCE.git ~/JUCE

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_DIR="$HOME/JUCE"

      - name: Build
        run: cmake --build build --config Release -- -j$(nproc)

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  tsan:
    name: TSAN — GranoTests (Linux)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libasound2-dev libjack-jackd2-dev \
            libcurl4-openssl-dev libfreetype-dev \
            libx11-dev libxcomposite-dev libxcursor-dev \
            libxinerama-dev libxrandr-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libfontconfig1-dev libgl1-mesa-dev

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: ~/JUCE
          key: juce-${{ env.JUCE_VERSION }}-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Clone JUCE 8
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.JUCE_VERSION }} https://github.com/juce-framework/JUCE.git ~/JUCE

      - name: Configure (TSAN + tests only)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DJUCE_DIR="$HOME/JUCE" \
            -DGRANO_BUILD_TESTS=ON \
            -DGRANO_ENABLE_TSAN=ON

      - name: Build GranoTests
        run: cmake --build build --target GranoTests -j$(nproc)

      - name: Run tests under TSAN
        run: ctest --test-dir build --output-on-failure
        env:
          TSAN_OPTIONS: "suppressions=${{ github.workspace }}/Tests/tsan_suppressions.txt halt_on_error=1 second_deadlock_stack=1"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows VST3
        uses: actions/download-artifact@v4
        with:
          name: Grano-VST3-Windows
          path: release/Windows/VST3

      - name: Download Windows Standalone
        uses: actions/download-artifact@v4
        with:
          name: Grano-Standalone-Windows
          path: release/Windows/Standalone

      - name: Download macOS VST3
        uses: actions/download-artifact@v4
        with:
          name: Grano-VST3-macOS
          path: release/macOS/VST3

      - name: Download macOS AU
        uses: actions/download-artifact@v4
        with:
          name: Grano-AU-macOS
          path: release/macOS/AU

      - name: Download macOS Standalone
        uses: actions/download-artifact@v4
        with:
          name: Grano-Standalone-macOS
          path: release/macOS/Standalone

      - name: Stage docs into release dirs
        run: |
          cp LICENSE README.md release/Windows/
          cp LICENSE README.md release/macOS/

      - name: Package Windows zip
        run: |
          cd release/Windows
          zip -r ../../Grano-${{ github.ref_name }}-Windows.zip VST3/ Standalone/ LICENSE README.md
          echo "Windows zip contents:"
          zipinfo ../../Grano-${{ github.ref_name }}-Windows.zip

      - name: Package macOS zip
        run: |
          cd release/macOS
          zip -r ../../Grano-${{ github.ref_name }}-macOS.zip VST3/ AU/ Standalone/ LICENSE README.md
          echo "macOS zip contents:"
          zipinfo ../../Grano-${{ github.ref_name }}-macOS.zip

      - name: Create GitHub release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Grano ${{ github.ref_name }}" \
            --prerelease \
            --notes "## Installation

          **Windows:** Extract zip, copy \`Grano.vst3\` to \`C:\\Program Files\\Common Files\\VST3\\\`, run \`Grano.exe\` standalone.

          **macOS:** Extract zip, copy \`Grano.vst3\` to \`~/Library/Audio/Plug-Ins/VST3/\`, copy \`Grano.component\` to \`~/Library/Audio/Plug-Ins/Components/\`. If Gatekeeper blocks: \`sudo xattr -rd com.apple.quarantine /Library/Audio/Plug-Ins/VST3/Grano.vst3\`

          See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for full instructions." \
            Grano-${{ github.ref_name }}-Windows.zip \
            Grano-${{ github.ref_name }}-macOS.zip
        env:
          GH_TOKEN: ${{ github.token }}
